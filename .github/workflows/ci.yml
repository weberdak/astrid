name: Rust Code Coverage

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
        #python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          #python-version: ${{ matrix.python-version }}

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Rust
        run: cargo build --verbose

      - name: Run Rust tests
        run: cargo test --verbose

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Generate Rust Coverage (Cobertura XML)
        run: cargo llvm-cov --all-features --cobertura --output-path coverage/rust.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/rust.xml
          flags: rust
          fail_ci_if_error: false
          verbose: true

      - name: Generate Detailed Coverage Report
        run: python3 scripts/render-rust-coverage.py coverage/rust.xml coverage/rust-coverage-report.md
        continue-on-error: true

      - name: Write to Job Summary
        run: cat coverage/rust-coverage-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage-results
          path: |
            coverage/rust.xml
            coverage/rust-coverage-report.md
          if-no-files-found: warn